<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Show Ops</title>
<style>
  :root {
    --bg: #0e1117;
    --card: #161b24;
    --card2: #1c2230;
    --line: #2a3242;
    --text: #e8ecf3;
    --dim: #8b96a8;
    --accent: #4da3ff;
    --green: #3ddc84;
    --amber: #ffb454;
    --red: #ff6b6b;
    --chip: #232b3b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px; line-height: 1.45;
    padding-bottom: 40px;
  }
  a { color: var(--accent); text-decoration: none; }

  /* ── PIN gate ── */
  #pinGate {
    position: fixed; inset: 0; background: var(--bg); z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    padding: 24px;
  }
  #pinGate h1 { font-size: 22px; }
  #pinGate p { color: var(--dim); font-size: 14px; text-align: center; }
  #pinInput {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    color: var(--text); font-size: 28px; letter-spacing: 12px; text-align: center;
    padding: 12px 8px; width: 220px; outline: none;
  }
  #pinInput:focus { border-color: var(--accent); }
  #pinBtn {
    background: var(--accent); color: #06121f; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; padding: 12px 36px; cursor: pointer;
  }
  #pinErr { color: var(--red); font-size: 14px; min-height: 20px; }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(14,17,23,.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  }
  header h1 { font-size: 18px; flex: 1; }
  #updated { color: var(--dim); font-size: 12px; }
  #refreshBtn {
    background: var(--chip); border: 1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 7px 14px; font-size: 14px; cursor: pointer;
  }
  #refreshBtn:active { opacity: .6; }

  /* ── Stat chips ── */
  #stats { display: flex; gap: 8px; padding: 12px 16px 4px; flex-wrap: wrap; max-width: 980px; margin: 0 auto; }
  .stat {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 8px 14px; font-size: 13px; color: var(--dim);
  }
  .stat b { color: var(--text); font-size: 15px; margin-right: 4px; }

  /* ── Cards ── */
  #shows { padding: 10px 12px; display: grid; gap: 12px; max-width: 980px; margin: 0 auto; }
  @media (min-width: 760px) { #shows { grid-template-columns: 1fr 1fr; padding: 10px 16px; } }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 14px 14px 10px; overflow: hidden;
  }
  .card.urgent { border-color: var(--amber); }
  .card.live { border-color: var(--green); }
  .title { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .sub { color: var(--dim); font-size: 13px; margin-bottom: 8px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .chip {
    background: var(--chip); border-radius: 999px; padding: 3px 10px;
    font-size: 12px; font-weight: 600; color: var(--dim);
  }
  .chip.green { color: var(--green); background: rgba(61,220,132,.12); }
  .chip.amber { color: var(--amber); background: rgba(255,180,84,.12); }
  .chip.red   { color: var(--red);   background: rgba(255,107,107,.12); }
  .chip.blue  { color: var(--accent);background: rgba(77,163,255,.12); }

  .banner {
    border-radius: 10px; padding: 8px 12px; font-size: 14px; font-weight: 700;
    margin-bottom: 10px;
  }
  .banner.amber { background: rgba(255,180,84,.14); color: var(--amber); }
  .banner.green { background: rgba(61,220,132,.14); color: var(--green); }
  .banner.blue  { background: rgba(77,163,255,.14); color: var(--accent); }

  .dates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
  .d { background: var(--card2); border-radius: 10px; padding: 6px 8px; }
  .d .k { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .4px; }
  .d .v { font-size: 13px; font-weight: 600; }
  .d.past .v { color: var(--dim); font-weight: 400; }

  .row { padding: 8px 0; border-top: 1px solid var(--line); font-size: 14px; }
  .row .lbl { color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }

  details.sec { border-top: 1px solid var(--line); }
  details.sec summary {
    list-style: none; cursor: pointer; padding: 10px 0;
    display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600;
  }
  details.sec summary::-webkit-details-marker { display: none; }
  details.sec summary .count { color: var(--dim); font-weight: 400; font-size: 13px; flex: 1; }
  details.sec summary::after { content: "›"; color: var(--dim); transform: rotate(90deg); transition: transform .15s; }
  details.sec[open] summary::after { transform: rotate(-90deg); }
  .crewRow { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 14px; }
  .crewRow .nm { flex: 1; min-width: 0; }
  .crewRow .role { color: var(--dim); font-size: 12px; }
  .crewRow .st { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--chip); color: var(--dim); white-space: nowrap; }
  .crewRow .st.ok { color: var(--green); background: rgba(61,220,132,.12); }
  .crewRow .st.pencil { color: var(--amber); background: rgba(255,180,84,.12); }
  .crewRow a.ic {
    width: 34px; height: 34px; border-radius: 10px; background: var(--chip);
    display: flex; align-items: center; justify-content: center; font-size: 15px; flex: none;
  }
  .mailRow { padding: 7px 0; border-top: 1px dashed var(--line); }
  .mailRow:first-of-type { border-top: none; }
  .mailRow .meta { color: var(--dim); font-size: 12px; }
  .mailRow .subj { font-size: 13.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .links { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 0 6px; border-top: 1px solid var(--line); }
  .links a {
    background: var(--chip); border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 12px; font-size: 13px; font-weight: 600; color: var(--text);
  }

  /* wrapped section */
  #wrappedWrap { max-width: 980px; margin: 4px auto 0; padding: 0 12px; }
  #wrappedWrap > details > summary {
    list-style: none; cursor: pointer; color: var(--dim); font-size: 14px; padding: 10px 4px;
  }
  #wrappedWrap summary::-webkit-details-marker { display: none; }
  .wrapped .card { opacity: .65; }

  #msg { text-align: center; color: var(--dim); padding: 40px 20px; }
  #errBar {
    display: none; margin: 10px auto; max-width: 948px; background: rgba(255,107,107,.12); color: var(--red);
    border-radius: 12px; padding: 10px 14px; font-size: 14px;
  }
  #errBar button { background: none; border: 1px solid var(--red); color: var(--red); border-radius: 8px; padding: 4px 12px; margin-left: 10px; cursor: pointer; }
  .spin { display: inline-block; animation: rot 1s linear infinite; }
  @keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="pinGate">
  <h1>Show Ops</h1>
  <p>Enter PIN to unlock</p>
  <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" maxlength="8">
  <div id="pinErr"></div>
  <button id="pinBtn">Unlock</button>
</div>

<header style="display:none" id="hdr">
  <h1>Show Ops</h1>
  <span id="updated"></span>
  <button id="refreshBtn">↻</button>
</header>

<div id="errBar"><span id="errTxt"></span><button onclick="loadAll()">Retry</button></div>
<div id="stats"></div>
<div id="shows"></div>
<div id="wrappedWrap"></div>
<div id="msg"></div>

<script>
"use strict";
// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
const WORKER = "https://fuse-dashboard-proxy.iqlarodework.workers.dev";
const BASE = "appcbc1CDJKyKb8db";
const EVENTS_TBL = "tblno1XUMyyVeA2z6";
const POS_TBL = "tblloB4sAREi8YqrC";
const MAIL_TBL = "tblu9DkXv7Z8e7vNq";
const IQRAL_VIEW = "viwT3CcaSHtTVAZBi";
const ME = "Iqral";
const URGENT_DAYS = 5;            // urgency window (Iq preference)
const WRAPPED_LOOKBACK = 7;       // keep just-ended shows visible this many days

const EVENT_FIELDS = [
  "Combined Name","Name","Timeline Start","Timeline End","Status",
  "Booth Number","QuoteNumber(string)",
  "Venue","Venue Address Combined","Venue City","Venue State",
  "Travel In","Load In","Show Start","Show End","Load Out","Travel Out",
  "Dropbox URL","Dropbox Content URL","AV Binder Live Link","infoDocs link",
  "Account Manager Name","Account Manager Phone","Account Manager Name Email",
  "Zapier Emails"
];
const POS_FIELDS = ["Name (from Crew)","Email (from Crew)","Phone Number (from Crew)","Status","Short Name (from Roles)","id (from Event)"];
const MAIL_FIELDS = ["From","Subject","Received Date","Related Event"];

// ════════════════════════════════════════════════
// API LAYER
// ════════════════════════════════════════════════
function pin() { return localStorage.getItem("dash_pin") || ""; }

async function api(table, params) {
  const qs = new URLSearchParams();
  for (const [k, v] of Object.entries(params || {})) {
    if (Array.isArray(v)) v.forEach(x => qs.append(k, x));
    else qs.append(k, v);
  }
  qs.append("key", pin());
  let url = `${WORKER}/v0/${BASE}/${encodeURIComponent(table)}?${qs}`;
  let out = [];
  for (let page = 0; page < 5; page++) {
    const res = await fetch(url);
    if (res.status === 401) { const e = new Error("PIN rejected"); e.auth = true; throw e; }
    if (!res.ok) throw new Error(`Airtable error ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || data.error);
    out = out.concat(data.records || []);
    if (!data.offset) break;
    url = `${WORKER}/v0/${BASE}/${encodeURIComponent(table)}?${qs}&offset=${data.offset}`;
  }
  return out;
}

// ════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const first = v => Array.isArray(v) ? v[0] : v;

function parseDate(v) {
  v = first(v);
  if (!v) return null;
  let m = String(v).match(/^(\d{4})-(\d{2})-(\d{2})/);          // 2026-06-13
  if (m) return new Date(+m[1], +m[2]-1, +m[3], 12);
  m = String(v).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);        // 06/14/2026
  if (m) return new Date(+m[3], +m[1]-1, +m[2], 12);
  const d = new Date(v);
  return isNaN(d) ? null : d;
}
function today0() { const d = new Date(); d.setHours(12,0,0,0); return d; }
function daysFromToday(d) { return Math.round((d - today0()) / 86400000); }
function fmtD(d) { return d ? d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "—"; }
function fmtRange(a, b) {
  if (!a && !b) return "";
  if (a && b) return fmtD(a) + " – " + fmtD(b);
  return fmtD(a || b);
}
function agoTxt(d) {
  const n = -daysFromToday(d);
  if (n <= 0) return "today";
  if (n === 1) return "1d ago";
  return n + "d ago";
}
function senderName(from) {
  if (!from) return "";
  const f = String(from);
  return f.includes("@") ? f.split("@")[0].replace(/[._]/g, " ") : f;
}

// ════════════════════════════════════════════════
// DATA LOAD
// ════════════════════════════════════════════════
let lastLoad = 0;

async function loadAll() {
  const showsEl = document.getElementById("shows");
  const msg = document.getElementById("msg");
  document.getElementById("errBar").style.display = "none";
  document.getElementById("refreshBtn").innerHTML = '<span class="spin">↻</span>';
  if (!showsEl.children.length) msg.textContent = "Loading shows…";

  try {
    const events = await api(EVENTS_TBL, {
      view: IQRAL_VIEW,
      filterByFormula: `IS_AFTER({Timeline End},DATEADD(TODAY(),-${WRAPPED_LOOKBACK},'days'))`,
      "fields[]": EVENT_FIELDS
    });

    let positions = [], mails = [];
    const ids = events.map(e => e.id);
    const quotes = events.map(e => e.fields["QuoteNumber(string)"]).filter(q => q && /^\d{4,}$/.test(q));

    const jobs = [];
    if (ids.length) {
      const posFormula = "OR(" + ids.map(id => `FIND('${id}',ARRAYJOIN({id (from Event)}))`).join(",") + ")";
      jobs.push(api(POS_TBL, { filterByFormula: posFormula, "fields[]": POS_FIELDS }).then(r => positions = r));
    }
    if (quotes.length) {
      const mailFormula = "OR(" + quotes.map(q => `FIND('${q}',ARRAYJOIN({Related Event}))`).join(",") + ")";
      jobs.push(api(MAIL_TBL, {
        filterByFormula: mailFormula,
        "fields[]": MAIL_FIELDS,
        "sort[0][field]": "Received Date",
        "sort[0][direction]": "desc",
        pageSize: 100
      }).then(r => mails = r).catch(() => mails = [])); // email layer is non-fatal
    }
    await Promise.all(jobs);

    render(events, positions, mails);
    lastLoad = Date.now();
    msg.textContent = events.length ? "" : "No active shows assigned to you in Airtable.";
    document.getElementById("updated").textContent =
      "Live · " + new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  } catch (err) {
    if (err.auth) { localStorage.removeItem("dash_pin"); showGate("PIN no longer valid — re-enter."); return; }
    msg.textContent = "";
    document.getElementById("errTxt").textContent = "Couldn't load data: " + err.message;
    document.getElementById("errBar").style.display = "block";
  } finally {
    document.getElementById("refreshBtn").innerHTML = "↻";
  }
}

// ════════════════════════════════════════════════
// MODEL + RENDER
// ════════════════════════════════════════════════
function buildModel(ev, positions, mails) {
  const f = ev.fields;
  const combined = f["Combined Name"] || f["Name"] || "Untitled";
  const title = combined.split("•")[0].trim();
  const quote = f["QuoteNumber(string)"] || "";

  const crew = positions
    .filter(p => {
      const pid = p.fields["id (from Event)"];
      return Array.isArray(pid) ? pid.includes(ev.id) : pid === ev.id;
    })
    .map(p => ({
      name: (first(p.fields["Name (from Crew)"]) || "").replace(/^\*/, ""),
      email: first(p.fields["Email (from Crew)"]) || "",
      phone: first(p.fields["Phone Number (from Crew)"]) || "",
      role: first(p.fields["Short Name (from Roles)"]) || "",
      status: p.fields["Status"] || ""
    }))
    .filter(c => c.name);

  const myMails = mails.filter(m => (m.fields["Related Event"] || []).includes(ev.id));

  return {
    id: ev.id, title, quote,
    booth: f["Booth Number"] || "",
    status: f["Status"] || "",
    venue: first(f["Venue"]) || "",
    address: first(f["Venue Address Combined"]) || "",
    city: [f["Venue City"], f["Venue State"]].filter(Boolean).join(", "),
    tlStart: parseDate(f["Timeline Start"]),
    tlEnd: parseDate(f["Timeline End"]),
    dates: {
      "Travel In": parseDate(f["Travel In"]),
      "Load In": parseDate(f["Load In"]),
      "Show Start": parseDate(f["Show Start"]),
      "Show End": parseDate(f["Show End"]),
      "Load Out": parseDate(f["Load Out"]),
      "Travel Out": parseDate(f["Travel Out"])
    },
    links: {
      "Dropbox": f["Dropbox URL"], "Content": f["Dropbox Content URL"],
      "AV Binder": first(f["AV Binder Live Link"]), "InfoDoc": first(f["infoDocs link"])
    },
    am: {
      name: (first(f["Account Manager Name"]) || "").replace(/^\*/, ""),
      phone: first(f["Account Manager Phone"]) || "",
      email: first(f["Account Manager Name Email"]) || ""
    },
    crew,
    travel: crew.some(c => c.name.includes(ME)),
    mailTotal: (f["Zapier Emails"] || []).length,
    mailRecent: myMails.slice(0, 5).map(m => ({
      from: senderName(m.fields["From"]),
      subj: m.fields["Subject"] || "(no subject)",
      date: parseDate(m.fields["Received Date"])
    }))
  };
}

function cardHTML(s) {
  const t = today0();
  const loadIn = s.dates["Load In"] || s.tlStart;
  const end = s.tlEnd;
  const dLoad = loadIn ? daysFromToday(loadIn) : null;

  let stateCls = "", banner = "";
  if (end && end < t) {
    banner = "";
  } else if (s.tlStart && s.tlStart <= t) {
    stateCls = "live";
    banner = `<div class="banner green">● LIVE — runs through ${fmtD(end)}</div>`;
  } else if (dLoad !== null && dLoad <= URGENT_DAYS) {
    stateCls = "urgent";
    banner = `<div class="banner amber">⚠ Load-in ${dLoad === 0 ? "TODAY" : "in " + dLoad + "d"} — ${fmtD(loadIn)}</div>`;
  } else if (dLoad !== null) {
    banner = `<div class="banner blue">Load-in in ${dLoad}d — ${fmtD(loadIn)}</div>`;
  }

  const dateCells = Object.entries(s.dates).filter(([, d]) => d).map(([k, d]) =>
    `<div class="d ${d < t ? "past" : ""}"><div class="k">${k}</div><div class="v">${fmtD(d)}</div></div>`).join("");

  const crewRows = s.crew.map(c => {
    const st = String(c.status).toLowerCase();
    const stCls = st.includes("confirm") ? "ok" : (st.includes("pencil") ? "pencil" : "");
    return `<div class="crewRow">
      <div class="nm">${esc(c.name)} <span class="role">${esc(c.role)}</span></div>
      ${c.status ? `<span class="st ${stCls}">${esc(c.status)}</span>` : ""}
      ${c.phone ? `<a class="ic" href="tel:${esc(String(c.phone).replace(/[^\d+]/g, ""))}">📞</a>` : ""}
      ${c.email ? `<a class="ic" href="mailto:${esc(c.email)}">✉️</a>` : ""}
    </div>`;
  }).join("") || `<div class="crewRow" style="color:var(--red)">No crew assigned</div>`;

  const latest = s.mailRecent[0];
  const mailSummary = s.mailTotal
    ? `${s.mailTotal} email${s.mailTotal > 1 ? "s" : ""}${latest && latest.date ? " · last " + agoTxt(latest.date) : ""}`
    : "no emails";
  const mailRows = s.mailRecent.map(m =>
    `<div class="mailRow">
       <div class="meta">${m.date ? fmtD(m.date) : ""} · ${esc(m.from)}</div>
       <div class="subj">${esc(m.subj)}</div>
     </div>`).join("");
  const gmailQ = encodeURIComponent('"' + (s.quote || s.title) + '"');
  const gmail = `<div style="padding:6px 0 10px"><a href="https://mail.google.com/mail/u/0/#search/${gmailQ}" target="_blank" rel="noopener">Open thread in Gmail →</a></div>`;

  const linkBtns = Object.entries(s.links).filter(([, u]) => u)
    .map(([k, u]) => `<a href="${esc(u)}" target="_blank" rel="noopener">${k}</a>`).join("")
    + `<a href="https://airtable.com/${BASE}/${EVENTS_TBL}/${s.id}" target="_blank" rel="noopener">Airtable</a>`;

  const mapsQ = encodeURIComponent([s.venue, s.address].filter(Boolean).join(", "));
  const venueLine = s.venue
    ? `<div class="row"><div class="lbl">Venue</div><a href="https://maps.google.com/?q=${mapsQ}" target="_blank" rel="noopener">${esc(s.venue)}</a>${s.city ? ` <span style="color:var(--dim)">· ${esc(s.city)}</span>` : ""}</div>`
    : "";

  const amLine = s.am.name
    ? `<div class="row"><div class="lbl">Account Manager</div>${esc(s.am.name)}
        ${s.am.phone ? ` · <a href="tel:${esc(String(s.am.phone).replace(/[^\d+]/g, ""))}">${esc(s.am.phone)}</a>` : ""}
        ${s.am.email ? ` · <a href="mailto:${esc(s.am.email)}">email</a>` : ""}</div>`
    : "";

  return `<div class="card ${stateCls}">
    <div class="title">${esc(s.title)}</div>
    <div class="sub">${s.quote ? "Quote #" + esc(s.quote) + " · " : ""}${s.booth ? "Booth " + esc(s.booth) + " · " : ""}${fmtRange(s.tlStart, s.tlEnd)}</div>
    <div class="chips">
      <span class="chip ${s.travel ? "blue" : ""}">${s.travel ? "✈ TRAVEL" : "REMOTE"}</span>
      ${s.status ? `<span class="chip ${s.status === "Confirmed" ? "green" : "amber"}">${esc(s.status)}</span>` : ""}
      <span class="chip">✉ ${esc(mailSummary)}</span>
    </div>
    ${banner}
    <div class="dates">${dateCells}</div>
    ${venueLine}
    ${amLine}
    <details class="sec">
      <summary>Crew <span class="count">${s.crew.length}</span></summary>
      ${crewRows}
    </details>
    <details class="sec">
      <summary>Emails <span class="count">${esc(mailSummary)}</span></summary>
      ${mailRows || '<div class="mailRow" style="color:var(--dim);font-size:13px">No emails linked in Airtable</div>'}
      ${gmail}
    </details>
    <div class="links">${linkBtns}</div>
  </div>`;
}

function render(events, positions, mails) {
  const t = today0();
  const models = events.map(e => buildModel(e, positions, mails))
    .sort((a, b) => (a.tlStart || 0) - (b.tlStart || 0));

  const active = models.filter(s => !s.tlEnd || s.tlEnd >= t);
  const wrapped = models.filter(s => s.tlEnd && s.tlEnd < t);

  const live = active.filter(s => s.tlStart && s.tlStart <= t).length;
  const travel = active.filter(s => s.travel).length;
  const nextUp = active.find(s => s.tlStart && s.tlStart > t);
  const nextTxt = nextUp ? `<div class="stat"><b>${daysFromToday(nextUp.dates["Load In"] || nextUp.tlStart)}d</b> to next load-in</div>` : "";
  document.getElementById("stats").innerHTML =
    `<div class="stat"><b>${active.length}</b> active</div>
     <div class="stat"><b>${live}</b> live now</div>
     <div class="stat"><b>${travel}</b> travel</div>${nextTxt}`;

  document.getElementById("shows").innerHTML = active.map(cardHTML).join("");
  document.getElementById("wrappedWrap").innerHTML = wrapped.length
    ? `<details><summary>Just wrapped (${wrapped.length}) ›</summary><div class="wrapped" style="display:grid;gap:12px;padding-top:6px">${wrapped.map(cardHTML).join("")}</div></details>`
    : "";
}

// ════════════════════════════════════════════════
// PIN GATE + BOOT
// ════════════════════════════════════════════════
function showGate(errMsg) {
  document.getElementById("pinGate").style.display = "flex";
  document.getElementById("hdr").style.display = "none";
  document.getElementById("pinErr").textContent = errMsg || "";
  setTimeout(() => document.getElementById("pinInput").focus(), 50);
}
function hideGate() {
  document.getElementById("pinGate").style.display = "none";
  document.getElementById("hdr").style.display = "flex";
}

async function tryPin() {
  const v = document.getElementById("pinInput").value.trim();
  if (!v) return;
  const btn = document.getElementById("pinBtn");
  btn.textContent = "Checking…"; btn.disabled = true;
  try {
    const res = await fetch(`${WORKER}/v0/${BASE}/${EVENTS_TBL}?maxRecords=1&fields%5B%5D=Name&key=${encodeURIComponent(v)}`);
    if (res.status === 401) {
      localStorage.removeItem("dash_pin");
      document.getElementById("pinErr").textContent = "Wrong PIN — try again.";
      document.getElementById("pinInput").value = "";
    } else if (!res.ok) {
      document.getElementById("pinErr").textContent = "Connection problem (" + res.status + ").";
    } else {
      localStorage.setItem("dash_pin", v);
      hideGate();
      loadAll();
    }
  } catch (e) {
    document.getElementById("pinErr").textContent = "Network error — check connection.";
  } finally {
    btn.textContent = "Unlock"; btn.disabled = false;
  }
}

document.getElementById("pinBtn").addEventListener("click", tryPin);
document.getElementById("pinInput").addEventListener("keydown", e => { if (e.key === "Enter") tryPin(); });
document.getElementById("refreshBtn").addEventListener("click", loadAll);
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && lastLoad && Date.now() - lastLoad > 10 * 60 * 1000) loadAll();
});

(function boot() {
  if (pin()) { hideGate(); loadAll(); }
  else showGate();
})();
</script>
