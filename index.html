<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#101214">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Show Ops">

<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<title>Show Ops</title>
<!-- build: 2026-06-11 r7 (booth ship date = real deadline when before load-in) -->
<style>
  :root {
    --bg: #101214;
    --panel: #16191c;
    --panel2: #1b1f23;
    --line: #2a2f35;
    --text: #dde2e8;
    --dim: #848e99;
    --accent: #58a6ff;
    --green: #3fb950;
    --amber: #d29922;
    --red: #f85149;
    --sel: #1f2937;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    font-size: 13px; line-height: 1.4; height: 100dvh; overflow: hidden;
  }
  a { color: var(--accent); text-decoration: none; }
  .mono { font-variant-numeric: tabular-nums; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: 4px; }
  /* generous hit area without changing layout */
  .tap { padding: 12px; margin: -12px; display: inline-block; }
  button { font-family: inherit; }

  /* ── PIN gate ── */
  #pinGate {
    position: fixed; inset: 0; background: var(--bg); z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px;
  }
  #pinGate h1 { font-size: 18px; font-weight: 600; }
  #pinInput {
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    color: var(--text); font-size: 22px; letter-spacing: 10px; text-align: center;
    padding: 10px 8px; width: 200px; outline: none;
  }
  #pinInput:focus { border-color: var(--accent); }
  #pinBtn {
    background: var(--accent); color: #04101f; border: none; border-radius: 6px;
    font-size: 14px; font-weight: 600; padding: 12px 36px; cursor: pointer; min-height: 44px;
  }
  #pinErr { color: var(--red); font-size: 13px; min-height: 18px; }

  /* ── App frame ── */
  #app { display: none; height: 100dvh; flex-direction: column; }
  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: env(safe-area-inset-top) 14px 0; min-height: calc(42px + env(safe-area-inset-top)); flex: none;
    background: var(--panel); border-bottom: 1px solid var(--line);
  }
  #topbar h1 { font-size: 14px; font-weight: 700; letter-spacing: .3px; }
  #topStats { display: flex; gap: 14px; color: var(--dim); font-size: 12px; flex: 1; overflow: hidden; white-space: nowrap; }
  #topStats b { color: var(--text); font-weight: 600; }
  #updated { color: var(--dim); font-size: 11px; white-space: nowrap; }
  #updated.stale { color: var(--amber); }
  #refreshBtn {
    background: none; border: 1px solid var(--line); color: var(--dim); border-radius: 6px;
    min-width: 44px; min-height: 36px; font-size: 15px; cursor: pointer;
  }
  #refreshBtn:hover { color: var(--text); border-color: var(--dim); }

  #main { display: flex; flex: 1; min-height: 0; }

  /* ── Show list (left) ── */
  #list {
    width: 330px; flex: none; overflow-y: auto;
    border-right: 1px solid var(--line); background: var(--panel);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .lrow { padding: 10px 12px 9px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .lrow:hover { background: var(--panel2); }
  .lrow.sel { background: var(--sel); box-shadow: inset 3px 0 0 var(--accent); }
  .lrow .t { font-size: 13px; font-weight: 600; display: flex; gap: 6px; align-items: baseline; }
  .lrow .t .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lrow .m { display: flex; gap: 8px; color: var(--dim); font-size: 11.5px; margin-top: 2px; align-items: center; }
  .tag { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: .4px; flex: none; }
  .tag.travel { color: #9ecbff; background: rgba(88,166,255,.15); }
  .tag.remote { color: var(--dim); background: rgba(132,142,153,.15); }
  .tag.live   { color: var(--green); background: rgba(63,185,80,.15); }
  .tag.urgent { color: var(--amber); background: rgba(210,153,34,.18); }
  .tag.danger { color: var(--red); background: rgba(248,81,73,.18); }
  .tag.done   { color: var(--dim); background: rgba(132,142,153,.1); }
  .lrow .cnt { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .newdot { color: var(--amber); font-weight: 700; }
  .lsec { padding: 6px 12px 4px; color: var(--dim); font-size: 10.5px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; background: var(--bg); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 2; }

  /* ── Detail (right) ── */
  #detail { flex: 1; overflow-y: auto; min-width: 0; }
  #detail .inner { padding: 14px 18px calc(60px + env(safe-area-inset-bottom)); max-width: 1400px; }
  #backBtn { display: none; background: none; border: none; color: var(--accent); font-size: 15px; padding: 12px 14px 2px; cursor: pointer; }

  .dhead { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 14px; margin-bottom: 4px; }
  .dhead h2 { font-size: 17px; font-weight: 700; }
  .dsub { display: flex; flex-wrap: wrap; gap: 6px 14px; align-items: center; color: var(--dim); font-size: 12.5px; margin-bottom: 12px; }

  .alert { border-radius: 6px; padding: 8px 12px; font-size: 13px; font-weight: 700; margin-bottom: 12px; }
  .alert.red { background: rgba(248,81,73,.12); color: var(--red); border: 1px solid rgba(248,81,73,.4); }
  .alert.amber { background: rgba(210,153,34,.12); color: var(--amber); border: 1px solid rgba(210,153,34,.35); }

  .datebar {
    display: flex; border: 1px solid var(--line); border-radius: 6px; overflow-x: auto; margin-bottom: 12px; background: var(--panel);
  }
  .datebar .d { flex: 1; min-width: 86px; padding: 7px 10px; border-right: 1px solid var(--line); }
  .datebar .d:last-child { border-right: none; }
  .datebar .k { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; }
  .datebar .v { font-size: 13.5px; font-weight: 600; margin-top: 1px; white-space: nowrap; }
  .datebar .d.today { background: rgba(210,153,34,.12); }
  .datebar .d.today .v { color: var(--amber); }
  .datebar .d.ship:not(.past) { background: rgba(210,153,34,.08); }
  .datebar .d.ship:not(.past) .v, .datebar .d.ship:not(.past) .k { color: var(--amber); }
  .datebar .d.past .v { color: var(--dim); font-weight: 400; }

  #wx { display: flex; gap: 6px; overflow-x: auto; margin: -4px 0 12px; }
  #wx .w { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 5px 9px; font-size: 12px; white-space: nowrap; color: var(--dim); }
  #wx .w b { color: var(--text); font-weight: 600; }

  .cols { display: grid; grid-template-columns: 1fr 1.15fr; gap: 14px; margin-bottom: 14px; }
  @media (max-width: 1100px) { .cols { grid-template-columns: 1fr; } }
  .box { border: 1px solid var(--line); border-radius: 6px; background: var(--panel); }
  .box h3 {
    font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .7px;
    padding: 7px 12px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px;
  }
  .box h3 .r { margin-left: auto; font-weight: 400; text-transform: none; letter-spacing: 0; }
  .box .pad { padding: 8px 12px; }
  .box h3 button { background: none; border: none; color: var(--accent); font-size: 12px; cursor: pointer; padding: 6px; margin: -6px; }

  table.grid { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.grid td { padding: 8px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
  table.grid tr:last-child td { border-bottom: none; }
  table.grid td.dim { color: var(--dim); white-space: nowrap; }
  table.grid td.r { text-align: right; white-space: nowrap; }
  .stat-ok { color: var(--green); } .stat-pencil { color: var(--amber); } .stat-other { color: var(--dim); }

  .linkbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .linkbar a, .linkbar button {
    border: 1px solid var(--line); background: var(--panel); color: var(--text);
    border-radius: 6px; padding: 9px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer; min-height: 38px;
  }
  .linkbar a:hover, .linkbar button:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Emails ── */
  .mail { border-bottom: 1px solid var(--line); }
  .mail:last-child { border-bottom: none; }
  .mail > .hd { display: flex; gap: 10px; padding: 11px 12px; cursor: pointer; align-items: baseline; }
  .mail > .hd:hover { background: var(--panel2); }
  .mail .from { font-weight: 600; white-space: nowrap; flex: none; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
  .mail .sub { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--dim); }
  .mail.open .sub { white-space: normal; color: var(--text); }
  .mail .dt { color: var(--dim); font-size: 11.5px; white-space: nowrap; flex: none; }
  .mail .body {
    display: none; padding: 4px 12px 12px; color: #c4ccd4; font-size: 12.5px;
    white-space: pre-wrap; word-break: break-word; border-top: 1px dashed var(--line);
    max-height: 420px; overflow-y: auto;
  }
  .mail.open .body { display: block; }
  .mail .to { color: var(--dim); font-size: 11px; padding: 4px 12px 0; display: none; }
  .mail.open .to { display: block; }
  .mailfoot { padding: 10px 12px; font-size: 12px; display: flex; gap: 16px; }

  #notesView { white-space: pre-wrap; }
  #notesEdit { display: none; padding: 8px 12px; }
  #notesEdit textarea {
    width: 100%; min-height: 120px; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; padding: 8px; font: inherit; resize: vertical;
  }
  #notesEdit .row2 { display: flex; gap: 8px; margin-top: 8px; }
  #notesEdit button { border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; min-height: 38px; }
  #notesSave { background: var(--accent); color: #04101f; border: none; font-weight: 700; }
  #notesCancel { background: none; color: var(--dim); border: 1px solid var(--line); }
  #notesMsg { color: var(--green); font-size: 12px; align-self: center; }

  #msg { text-align: center; color: var(--dim); padding: 50px 20px; }
  #errBar {
    display: none; margin: 8px 14px; background: rgba(248,81,73,.1); color: var(--red);
    border: 1px solid rgba(248,81,73,.4); border-radius: 6px; padding: 8px 12px; font-size: 13px;
  }
  #errBar button { background: none; border: 1px solid var(--red); color: var(--red); border-radius: 5px; padding: 6px 12px; margin-left: 10px; cursor: pointer; }
  .spin { display: inline-block; animation: rot 1s linear infinite; }
  @keyframes rot { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }

  /* ── Mobile ── */
  @media (max-width: 760px) {
    #main.show-detail #list { display: none; }
    #main:not(.show-detail) #detail { display: none; }
    #list { width: 100%; border-right: none; }
    #backBtn { display: block; }
    #detail .inner { padding: 10px 12px calc(60px + env(safe-area-inset-bottom)); }
    #topStats span:nth-child(n+4) { display: none; }
    .datebar .d { min-width: 78px; }
    .lrow { padding: 13px 12px 12px; }
  }
</style>
</head>
<body>

<div id="pinGate">
  <h1>Show Ops</h1>
  <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" maxlength="8" placeholder="PIN">
  <div id="pinErr"></div>
  <button id="pinBtn">Unlock</button>
</div>

<div id="app">
  <div id="topbar">
    <h1>SHOW OPS</h1>
    <div id="topStats"></div>
    <span id="updated"></span>
    <button id="refreshBtn" aria-label="Refresh">↻</button>
  </div>
  <div id="errBar"><span id="errTxt"></span><button onclick="loadAll()">Retry</button></div>
  <div id="main">
    <div id="list"></div>
    <div id="detail">
      <button id="backBtn">‹ All shows</button>
      <div class="inner" id="detailInner"><div id="msg">Loading shows…</div></div>
    </div>
  </div>
</div>

<script>
"use strict";
// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
const WORKER = "https://fuse-dashboard-proxy.iqlarodework.workers.dev";
const BASE = "appcbc1CDJKyKb8db";
const EVENTS_TBL = "tblno1XUMyyVeA2z6";
const POS_TBL = "tblloB4sAREi8YqrC";
const MAIL_TBL = "tblu9DkXv7Z8e7vNq";
const IQRAL_VIEW = "viwT3CcaSHtTVAZBi";
const ME = "Iqral";
const MY_EMAILS = ["ilarode@fuse-tg.com", "iqlarode@gmail.com"];
const URGENT_DAYS = 5;
const WRAPPED_LOOKBACK = 14;

const EVENT_FIELDS = [
  "Combined Name","Name","Timeline Start","Timeline End","Status",
  "Booth Number","QuoteNumber(string)",
  "Venue","Venue Address Combined","Venue City","Venue State",
  "Booth Ship Date","Travel In","Load In","Show Start","Show End","Load Out","Travel Out",
  "Dropbox URL","Dropbox Content URL","AV Binder Live Link","infoDocs link",
  "Account Manager Name","Account Manager Phone","Account Manager Name Email",
  "Zapier Emails","PM Notes","Client Notes"
];
const POS_FIELDS = ["Name (from Crew)","Email (from Crew)","Phone Number (from Crew)","Status","Short Name (from Roles)","id (from Event)",
  "Timeline Start","Timeline End","Start (from Timeline Dates)","End (from Timeline Dates)","Position Notes","Flight/Hotel Info","Hotel Info"];
const MAIL_META_FIELDS = ["From","Subject","Received Date","Related Event"];
const MAIL_FULL_FIELDS = ["From","To","CC","Subject","Received Date","Body","Attachments"];
const FILES_TBL = "tblivTW2lEP56DiuQ";
const FILE_FIELDS = ["Name","File","Notes","Created","Created By","id (from Events)"];

// ════════════════════════════════════════════════
// API LAYER
// ════════════════════════════════════════════════
function pin() { return localStorage.getItem("dash_pin") || ""; }

async function api(table, params, method, recordId, body) {
  const qs = new URLSearchParams();
  for (const [k, v] of Object.entries(params || {})) {
    if (Array.isArray(v)) v.forEach(x => qs.append(k, x));
    else qs.append(k, v);
  }
  qs.append("key", pin());
  const base = `${WORKER}/v0/${BASE}/${encodeURIComponent(table)}` + (recordId ? `/${recordId}` : "");
  if (method === "PATCH") {
    const res = await fetch(`${base}?${qs}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    if (res.status === 401) { const e = new Error("PIN rejected"); e.auth = true; throw e; }
    const data = await res.json();
    if (!res.ok || data.error) throw new Error((data.error && (data.error.message || data.error)) || ("HTTP " + res.status));
    return data;
  }
  let url = `${base}?${qs}`;
  let out = [];
  for (let page = 0; page < 6; page++) {
    const res = await fetch(url);
    if (res.status === 401) { const e = new Error("PIN rejected"); e.auth = true; throw e; }
    if (!res.ok) throw new Error(`Airtable error ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || data.error);
    out = out.concat(data.records || []);
    if (!data.offset) break;
    url = `${base}?${qs}&offset=${data.offset}`;
  }
  return out;
}

// ════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const first = v => Array.isArray(v) ? v[0] : v;

function parseDate(v) {
  v = first(v);
  if (!v) return null;
  if (v instanceof Date) return v;
  let m = String(v).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3], 12);
  m = String(v).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return new Date(+m[3], +m[1]-1, +m[2], 12);
  const d = new Date(v);
  return isNaN(d) ? null : d;
}
function today0() { const d = new Date(); d.setHours(12,0,0,0); return d; }
function daysFromToday(d) { return Math.round((d - today0()) / 86400000); }
function fmtD(d) { return d ? d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "—"; }
function sameDay(a, b) { return a && b && a.toDateString() === b.toDateString(); }
function fmtRange(a, b) {
  if (!a && !b) return "";
  if (a && b) {
    if (a.getTime() === b.getTime()) return fmtD(a);
    if (a.getMonth() === b.getMonth() && a.getFullYear() === b.getFullYear())
      return fmtD(a) + "–" + b.getDate();          // Jun 13–21
    return fmtD(a) + " – " + fmtD(b);
  }
  return fmtD(a || b);
}
function agoTxt(d) {
  const n = -daysFromToday(d);
  if (n <= 0) return "today";
  if (n === 1) return "1d ago";
  return n + "d ago";
}
function titleName(s) {
  return String(s || "").split(/\s+/).map(w => w ? w[0].toUpperCase() + w.slice(1) : w).join(" ");
}
function senderName(from) {
  if (!from) return "";
  const f = String(from);
  return titleName(f.includes("@") ? f.split("@")[0].replace(/[._]/g, " ") : f);
}
function fmtPhone(p) {
  let d = String(p).replace(/\D/g, "");
  if (d.length === 11 && d[0] === "1") d = d.slice(1);
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  return String(p);
}
function telHref(p) { return "tel:" + String(p).replace(/[^\d+]/g, ""); }
function cleanBody(b) {
  let t = String(b || "");
  t = t.replace(/\[([^\]]*)\]\(([^)]*)\)/g, (m, txt, url) => {
    if (!txt || /^https?:/.test(txt)) return /sophos|wearesparks|facebook|instagram|linkedin|youtube/i.test(url) ? "" : (txt || url);
    return txt;
  });
  t = t.split("\n").filter(line =>
    !/protection\.sophos\.com/.test(line) &&
    !/^<?https?:\/\/(www\.)?(facebook|instagram|youtube|linkedin)\./.test(line.trim()) &&
    !/This email and any attachments are intended only for the person/.test(line)
  ).join("\n");
  t = t.replace(/\*\*([^*]*)\*\*/g, "$1")
       .replace(/\\\*/g, "")
       .replace(/^\s*[#>]{1,6}\s*/gm, "")
       .replace(/\n{3,}/g, "\n\n")
       .trim();
  return t;
}
function extractEmails(s) {
  return [...new Set((String(s || "").match(/[\w.+-]+@[\w.-]+\.\w+/g) || []).map(x => x.toLowerCase()))];
}

// seen-email tracking (new-mail badges)
function seenKey(id) { return "seen_" + id; }
function latestMailTime(s) { return s.mailMeta[0] && s.mailMeta[0].date ? s.mailMeta[0].date.getTime() : 0; }
function newMailCount(s) {
  const seen = +localStorage.getItem(seenKey(s.id));
  if (!seen) { localStorage.setItem(seenKey(s.id), String(latestMailTime(s) || 1)); return 0; }
  return s.mailMeta.filter(m => m.date && m.date.getTime() > seen).length;
}
function markSeen(s) { if (s) localStorage.setItem(seenKey(s.id), String(Math.max(latestMailTime(s), 1))); }

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let SHOWS = [];
let RAW = null;            // {events, positions, mails}
let selectedId = null;
let lastLoad = 0;
const mailCache = {};
const filesCache = {};     // eventId -> {t, recs}  (attachment URLs expire, so re-fetch after 15 min)

// ════════════════════════════════════════════════
// DATA LOAD
// ════════════════════════════════════════════════
function applyData(events, positions, mails, fromCache) {
  RAW = { events, positions, mails };
  SHOWS = events.map(e => buildModel(e, positions, mails))
    .sort((a, b) => (a.tlStart || 0) - (b.tlStart || 0));
  const t = today0();
  if (!selectedId || !SHOWS.find(s => s.id === selectedId)) {
    const def = SHOWS.find(s => !s.tlEnd || s.tlEnd >= t) || SHOWS[0];
    selectedId = def ? def.id : null;
  }
  renderList();
  renderStats();
  renderDetail();
  document.getElementById("msg") && (document.getElementById("msg").textContent = SHOWS.length ? "" : "No active shows assigned to you in Airtable.");
  const up = document.getElementById("updated");
  if (fromCache) { up.textContent = "Cached — refreshing…"; up.classList.add("stale"); }
  else {
    up.textContent = "Live " + new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    up.classList.remove("stale");
  }
}

async function loadAll() {
  document.getElementById("errBar").style.display = "none";
  document.getElementById("refreshBtn").innerHTML = '<span class="spin">↻</span>';

  try {
    const events = await api(EVENTS_TBL, {
      view: IQRAL_VIEW,
      filterByFormula: `IS_AFTER({Timeline End},DATEADD(TODAY(),-${WRAPPED_LOOKBACK},'days'))`,
      "fields[]": EVENT_FIELDS
    });

    let positions = [], mails = [];
    const ids = events.map(e => e.id);
    const quotes = events.map(e => e.fields["QuoteNumber(string)"]).filter(q => q && /^\d{4,}$/.test(q));

    const jobs = [];
    if (ids.length) {
      const posFormula = "OR(" + ids.map(id => `FIND('${id}',ARRAYJOIN({id (from Event)}))`).join(",") + ")";
      jobs.push(api(POS_TBL, { filterByFormula: posFormula, "fields[]": POS_FIELDS }).then(r => positions = r));
    }
    if (quotes.length) {
      const mailFormula = "OR(" + quotes.map(q => `FIND('${q}',ARRAYJOIN({Related Event})&' '&{Subject})`).join(",") + ")";
      jobs.push(api(MAIL_TBL, {
        filterByFormula: mailFormula,
        "fields[]": MAIL_META_FIELDS,
        "sort[0][field]": "Received Date",
        "sort[0][direction]": "desc",
        pageSize: 100
      }).then(r => mails = r).catch(() => mails = []));
    }
    await Promise.all(jobs);

    lastLoad = Date.now();
    Object.keys(mailCache).forEach(k => delete mailCache[k]);
    try { localStorage.setItem("dash_cache", JSON.stringify({ t: lastLoad, events, positions, mails })); } catch (e) {}

    applyData(events, positions, mails, false);
  } catch (err) {
    if (err.auth) { localStorage.removeItem("dash_pin"); showGate("PIN no longer valid — re-enter."); return; }
    document.getElementById("errTxt").textContent = "Couldn't load data: " + err.message;
    document.getElementById("errBar").style.display = "block";
    const up = document.getElementById("updated");
    if (RAW) { up.textContent = "Offline — showing cached"; up.classList.add("stale"); }
  } finally {
    document.getElementById("refreshBtn").innerHTML = "↻";
  }
}

function buildModel(ev, positions, mails) {
  const f = ev.fields;
  const combined = f["Combined Name"] || f["Name"] || "Untitled";
  const title = combined.split("•")[0].replace(/#\s*$/, "").trim();

  const crew = positions
    .filter(p => {
      const pid = p.fields["id (from Event)"];
      return Array.isArray(pid) ? pid.includes(ev.id) : pid === ev.id;
    })
    .map(p => {
      const pf = p.fields;
      const starts = [].concat(pf["Start (from Timeline Dates)"] || []);
      const ends = [].concat(pf["End (from Timeline Dates)"] || []);
      let stints = starts.map((st, i) => ({ a: parseDate(st), b: parseDate(ends[i]) })).filter(x => x.a || x.b);
      if (!stints.length && (pf["Timeline Start"] || pf["Timeline End"])) {
        stints = [{ a: parseDate(pf["Timeline Start"]), b: parseDate(pf["Timeline End"]) }];
      }
      return {
        name: (first(pf["Name (from Crew)"]) || "").replace(/^\*/, ""),
        email: first(pf["Email (from Crew)"]) || "",
        phone: first(pf["Phone Number (from Crew)"]) || "",
        role: first(pf["Short Name (from Roles)"]) || "",
        status: pf["Status"] || "",
        stints,
        notes: pf["Position Notes"] || "",
        travelInfo: [first(pf["Flight/Hotel Info"]), first(pf["Hotel Info"])].filter(Boolean).join(" · ")
      };
    })
    .filter(c => c.name);

  const quoteStr = f["QuoteNumber(string)"] || "";
  const myMails = mails.filter(m =>
    (m.fields["Related Event"] || []).includes(ev.id) ||
    (quoteStr && String(m.fields["Subject"] || "").includes(quoteStr)));

  return {
    id: ev.id, title,
    quote: quoteStr,
    booth: f["Booth Number"] || "",
    status: f["Status"] || "",
    venue: first(f["Venue"]) || "",
    address: first(f["Venue Address Combined"]) || "",
    city: f["Venue City"] || "",
    cityState: [f["Venue City"], f["Venue State"]].filter(Boolean).join(", "),
    tlStart: parseDate(f["Timeline Start"]),
    tlEnd: parseDate(f["Timeline End"]),
    dates: {
      "Booth Ship": parseDate(f["Booth Ship Date"]),
      "Travel In": parseDate(f["Travel In"]),
      "Load In": parseDate(f["Load In"]),
      "Show Start": parseDate(f["Show Start"]),
      "Show End": parseDate(f["Show End"]),
      "Load Out": parseDate(f["Load Out"]),
      "Travel Out": parseDate(f["Travel Out"])
    },
    links: {
      "Dropbox": f["Dropbox URL"], "Content": f["Dropbox Content URL"],
      "AV Binder": first(f["AV Binder Live Link"]), "InfoDoc": first(f["infoDocs link"])
    },
    am: {
      name: (first(f["Account Manager Name"]) || "").replace(/^\*/, ""),
      phone: first(f["Account Manager Phone"]) || "",
      email: first(f["Account Manager Name Email"]) || ""
    },
    pmNotes: f["PM Notes"] || "",
    clientNotes: f["Client Notes"] || "",
    crew,
    travel: crew.some(c => c.name.includes(ME)),
    mailTotal: Math.max((f["Zapier Emails"] || []).length, myMails.length),
    mailMeta: myMails.map(m => ({
      id: m.id,
      from: senderName(m.fields["From"]),
      subj: m.fields["Subject"] || "(no subject)",
      date: parseDate(m.fields["Received Date"])
    }))
  };
}

// ════════════════════════════════════════════════
// STATE HELPERS
// ════════════════════════════════════════════════
// Real deadline = Booth Ship Date when it lands before load-in (or when there's no load-in yet)
function deadlineOf(s) {
  const ship = s.dates["Booth Ship"];
  const loadIn = s.dates["Load In"] || s.tlStart;
  if (ship && (!loadIn || ship < loadIn)) return { d: ship, label: "ship", ship: true };
  return { d: loadIn, label: "load-in", ship: false };
}
function stateOf(s) {
  const t = today0();
  if (s.tlEnd && s.tlEnd < t) return "done";
  if (s.tlStart && s.tlStart <= t) return "live";
  const dl = deadlineOf(s).d;
  const d = dl ? daysFromToday(dl) : null;
  if (d !== null && d <= URGENT_DAYS) return "urgent";
  return "upcoming";
}
function countdownTxt(s) {
  const st = stateOf(s);
  if (st === "done") return "wrapped " + agoTxt(s.tlEnd);
  if (st === "live") return "LIVE thru " + fmtD(s.tlEnd);
  const dl = deadlineOf(s);
  const d = daysFromToday(dl.d);
  const verb = dl.ship ? "📦 ships" : "load-in";
  return d === 0 ? verb + " TODAY" : verb + " in " + d + "d";
}
function crewRisk(s) {
  const st = stateOf(s);
  if (st !== "urgent" && st !== "live") return null;
  if (!s.crew.length) return { level: "red", txt: "NO CREW ASSIGNED" };
  const pencilled = s.crew.filter(c => String(c.status).toLowerCase().includes("pencil")).length;
  if (pencilled) return { level: "amber", txt: pencilled + " crew still pencilled" };
  return null;
}

// ════════════════════════════════════════════════
// RENDER — list + stats
// ════════════════════════════════════════════════
function renderList() {
  const t = today0();
  const active = SHOWS.filter(s => !s.tlEnd || s.tlEnd >= t);
  const wrapped = SHOWS.filter(s => s.tlEnd && s.tlEnd < t).reverse();

  const row = s => {
    const st = stateOf(s);
    const risk = crewRisk(s);
    const tag = risk && risk.level === "red" ? '<span class="tag danger">NO CREW</span>'
      : st === "live" ? '<span class="tag live">LIVE</span>'
      : st === "urgent" ? `<span class="tag urgent">${esc(countdownTxt(s).replace("load-in ", "LOAD-IN ").replace("ships ", "SHIPS "))}</span>`
      : st === "done" ? '<span class="tag done">DONE</span>' : "";
    const dl = deadlineOf(s);
    const shipChip = dl.ship && st !== "done" && st !== "live" && st !== "urgent"
      ? `<span style="color:var(--amber)">📦 ${fmtD(dl.d)}</span>` : "";
    const nNew = s.id === selectedId ? 0 : newMailCount(s);
    return `<div class="lrow ${s.id === selectedId ? "sel" : ""}" data-id="${s.id}" tabindex="0" role="button">
      <div class="t"><span class="nm">${esc(s.title)}</span>${tag}</div>
      <div class="m mono">
        <span>${fmtRange(s.tlStart, s.tlEnd)}</span>${shipChip}
        <span>${esc(s.cityState || "")}</span>
        <span class="tag ${s.travel ? "travel" : "remote"}">${s.travel ? "TRAVEL" : "REMOTE"}</span>
        <span class="cnt">${nNew ? `<span class="newdot">● ${nNew} new</span>` : ""}✉${s.mailTotal} 👥${s.crew.length}</span>
      </div>
    </div>`;
  };

  document.getElementById("list").innerHTML =
    `<div class="lsec">Active · ${active.length}</div>` +
    (active.map(row).join("") || `<div class="lrow" style="color:var(--dim)">No active shows</div>`) +
    (wrapped.length ? `<div class="lsec">Recently wrapped</div>` + wrapped.map(row).join("") : "");

  document.querySelectorAll(".lrow[data-id]").forEach(el => {
    const go = () => {
      selectedId = el.dataset.id;
      renderList(); renderDetail();
      document.getElementById("main").classList.add("show-detail");
    };
    el.addEventListener("click", go);
    el.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); } });
  });
}

function renderStats() {
  const t = today0();
  const active = SHOWS.filter(s => !s.tlEnd || s.tlEnd >= t);
  const live = active.filter(s => stateOf(s) === "live").length;
  const travel = active.filter(s => s.travel).length;
  const risks = active.filter(s => crewRisk(s)).length;
  const next = active.filter(s => s.tlStart && s.tlStart > t)[0];
  document.getElementById("topStats").innerHTML =
    `<span><b>${active.length}</b> active</span><span><b>${live}</b> live</span><span><b>${travel}</b> travel</span>` +
    (risks ? `<span style="color:var(--red)"><b>${risks}</b> at risk</span>` : "") +
    (next ? `<span>next: <b>${esc(next.title.split("@")[0].trim())}</b> ${countdownTxt(next)}</span>` : "");
}

// ════════════════════════════════════════════════
// FILES — view + upload (worker /upload → KV → Airtable)
// ════════════════════════════════════════════════
async function loadFiles(s, force) {
  const el = document.getElementById("filesList");
  if (!el) return;
  try {
    const c = filesCache[s.id];
    if (force || !c || Date.now() - c.t > 15 * 60 * 1000) {
      filesCache[s.id] = {
        t: Date.now(),
        recs: await api(FILES_TBL, {
          filterByFormula: `FIND('${s.id}',ARRAYJOIN({id (from Events)}))`,
          "fields[]": FILE_FIELDS,
          "sort[0][field]": "Created",
          "sort[0][direction]": "desc"
        })
      };
    }
    const recs = filesCache[s.id].recs;
    if (!recs.length) { el.innerHTML = '<div class="pad" style="color:var(--dim)">No files yet — upload drawings, photos, or docs.</div>'; return; }
    el.innerHTML = recs.map(r => {
      const f = r.fields;
      const atts = f["File"] || [];
      const by = f["Created By"] && f["Created By"].name ? f["Created By"].name : "";
      const when = f["Created"] ? fmtD(parseDate(f["Created"])) : "";
      const links = atts.map(a => {
        const img = a.thumbnails && a.thumbnails.large && String(a.type || "").startsWith("image/");
        return `<a href="${esc(a.url)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:6px;padding:7px 12px;font-size:12.5px;margin:0 8px 6px 0">
          ${img ? `<img src="${esc(a.thumbnails.small.url)}" alt="" style="height:24px;border-radius:3px">` : "📄"}
          ${esc(a.filename || "file")} <span style="color:var(--dim)">${a.size ? Math.round(a.size / 1024) + " KB" : ""}</span>
        </a>`;
      }).join("") || '<span style="color:var(--dim)">(no attachment)</span>';
      return `<div style="padding:9px 12px;border-bottom:1px solid var(--line)">
        <div style="display:flex;gap:10px;align-items:baseline;margin-bottom:5px">
          <b>${esc(f["Name"] || "Untitled")}</b>
          ${f["Notes"] ? `<span style="color:var(--dim);font-size:12px">${esc(f["Notes"])}</span>` : ""}
          <span class="mono" style="margin-left:auto;color:var(--dim);font-size:11.5px">${esc(by)}${by && when ? " · " : ""}${when}</span>
        </div>
        <div style="display:flex;flex-wrap:wrap">${links}</div>
      </div>`;
    }).join("");
  } catch (e) {
    el.innerHTML = `<div class="pad" style="color:var(--red)">Couldn't load files: ${esc(e.message)}</div>`;
  }
}

function setupFiles(s) {
  loadFiles(s, false);
  const input = document.getElementById("fileInput");
  const btn = document.getElementById("uploadBtn");
  const msg = document.getElementById("fileMsg");
  btn.addEventListener("click", () => input.click());
  input.addEventListener("change", async () => {
    const files = [...input.files];
    if (!files.length) return;
    btn.disabled = true;
    let ok = 0;
    for (let i = 0; i < files.length; i++) {
      msg.textContent = `Uploading ${i + 1}/${files.length}…`;
      try {
        const fd = new FormData();
        fd.append("file", files[i]);
        const res = await fetch(`${WORKER}/upload?eventId=${s.id}&key=${encodeURIComponent(pin())}`, { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || "HTTP " + res.status);
        ok++;
      } catch (e) {
        msg.textContent = `Failed: ${files[i].name} — ${e.message}`;
      }
    }
    if (ok) {
      msg.textContent = `✓ ${ok} uploaded`;
      setTimeout(() => { msg.textContent = ""; }, 4000);
      setTimeout(() => loadFiles(s, true), 2500);   // give Airtable a moment to ingest from KV
      setTimeout(() => loadFiles(s, true), 12000);  // attachments finish processing
    }
    btn.disabled = false;
    input.value = "";
  });
}

// ════════════════════════════════════════════════
// NOTES — edit PM Notes, save back to Airtable
// ════════════════════════════════════════════════
function setupNotes(s) {
  const view = document.getElementById("notesView");
  const edit = document.getElementById("notesEdit");
  const ta = document.getElementById("notesTa");
  const msg = document.getElementById("notesMsg");
  document.getElementById("notesEditBtn").addEventListener("click", () => {
    ta.value = s.pmNotes || "";
    view.style.display = "none"; edit.style.display = "block"; ta.focus();
  });
  document.getElementById("notesCancel").addEventListener("click", () => {
    edit.style.display = "none"; view.style.display = "block"; msg.textContent = "";
  });
  document.getElementById("notesSave").addEventListener("click", async () => {
    const btn = document.getElementById("notesSave");
    btn.disabled = true; btn.textContent = "Saving…"; msg.textContent = "";
    try {
      await api(EVENTS_TBL, {}, "PATCH", s.id, { fields: { "PM Notes": ta.value } });
      s.pmNotes = ta.value;
      const ev = RAW && RAW.events.find(e => e.id === s.id);
      if (ev) ev.fields["PM Notes"] = ta.value;
      try { localStorage.setItem("dash_cache", JSON.stringify({ t: lastLoad, ...RAW })); } catch (e) {}
      view.innerHTML = ta.value ? esc(ta.value) : '<span style="color:var(--dim)">No PM notes — tap Edit to add.</span>';
      edit.style.display = "none"; view.style.display = "block";
    } catch (e) {
      msg.style.color = "var(--red)"; msg.textContent = "Save failed: " + e.message;
    } finally {
      btn.disabled = false; btn.textContent = "Save to Airtable";
    }
  });
}

// ════════════════════════════════════════════════
// CALENDAR EXPORT (.ics)
// ════════════════════════════════════════════════
function downloadIcs(s) {
  const pad = n => String(n).padStart(2, "0");
  const dstr = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
  const short = s.title.split("@")[0].trim();
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//ShowOps//EN\r\n";
  Object.entries(s.dates).filter(([, d]) => d).forEach(([k, d], i) => {
    const end = new Date(d); end.setDate(end.getDate() + 1);
    ics += "BEGIN:VEVENT\r\n" +
      `UID:${s.id}-${i}@showops\r\n` +
      `DTSTAMP:${stamp}\r\n` +
      `DTSTART;VALUE=DATE:${dstr(d)}\r\n` +
      `DTEND;VALUE=DATE:${dstr(end)}\r\n` +
      `SUMMARY:${short} — ${k}\r\n` +
      `LOCATION:${(s.venue + (s.cityState ? ", " + s.cityState : "")).replace(/[,;]/g, "\\$&")}\r\n` +
      "END:VEVENT\r\n";
  });
  ics += "END:VCALENDAR\r\n";
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([ics], { type: "text/calendar" }));
  a.download = short.replace(/[^\w]+/g, "-") + ".ics";
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

// ════════════════════════════════════════════════
// WEATHER — open-meteo, free, no key; cached 3h
// ════════════════════════════════════════════════
const WMO = c =>
  c === 0 ? "☀" : c <= 2 ? "🌤" : c === 3 ? "☁" : c <= 48 ? "🌫" :
  c <= 57 ? "🌦" : c <= 67 ? "🌧" : c <= 77 ? "🌨" : c <= 82 ? "🌧" : c <= 86 ? "🌨" : "⛈";

async function loadWeather(s) {
  const el = document.getElementById("wx");
  if (!el || !s.city) return;
  const from = s.dates["Travel In"] || s.dates["Load In"] || s.tlStart;
  const end = s.tlEnd || from;
  if (!from || daysFromToday(from) > 14 || (end && end < today0())) return;

  try {
    const geoKey = "wx_geo_" + s.city.toLowerCase();
    let geo = JSON.parse(localStorage.getItem(geoKey) || "null");
    if (!geo) {
      const g = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(s.city)}&count=1&language=en&format=json`).then(r => r.json());
      if (!g.results || !g.results[0]) return;
      geo = { la: g.results[0].latitude, lo: g.results[0].longitude };
      localStorage.setItem(geoKey, JSON.stringify(geo));
    }
    const fcKey = "wx_fc_" + geo.la.toFixed(2) + "_" + geo.lo.toFixed(2);
    let fc = JSON.parse(localStorage.getItem(fcKey) || "null");
    if (!fc || Date.now() - fc.t > 3 * 3600 * 1000) {
      const data = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.la}&longitude=${geo.lo}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=auto&forecast_days=16`).then(r => r.json());
      if (!data.daily) return;
      fc = { t: Date.now(), d: data.daily };
      localStorage.setItem(fcKey, JSON.stringify(fc));
    }
    const t = today0();
    const cells = [];
    fc.d.time.forEach((ds, i) => {
      const d = parseDate(ds);
      if (!d || d < t || (from && d < new Date(from.getTime() - 86400000)) && d < t) return;
      if (from && d > new Date(Math.min((end || from).getTime(), t.getTime() + 15 * 86400000))) return;
      if (d < from && daysFromToday(from) > 2) return;   // only lead-in days when show is close
      if (cells.length >= 8) return;
      const pr = fc.d.precipitation_probability_max[i];
      cells.push(`<div class="w"><b>${d.toLocaleDateString("en-US", { weekday: "short", day: "numeric" })}</b> ${WMO(fc.d.weather_code[i])} ${Math.round(fc.d.temperature_2m_max[i])}°/${Math.round(fc.d.temperature_2m_min[i])}°${pr >= 30 ? ` <span style="color:var(--accent)">${pr}%</span>` : ""}</div>`);
    });
    if (cells.length) el.innerHTML = `<div class="w" style="border:none;background:none;padding-left:0">${esc(s.city)}:</div>` + cells.join("");
  } catch (e) { /* weather is decorative — fail silent */ }
}

// ════════════════════════════════════════════════
// EMAIL BODIES — lazy load per show, cached
// ════════════════════════════════════════════════
function replyAllHref(f, subj) {
  const all = extractEmails(String(f["From"] || "") + "," + String(f["To"] || "") + "," + String(f["CC"] || ""))
    .filter(a => !MY_EMAILS.includes(a));
  if (!all.length) return null;
  const to = extractEmails(f["From"])[0] || all[0];
  const cc = all.filter(a => a !== to);
  const sub = /^re:/i.test(subj) ? subj : "Re: " + subj;
  return `mailto:${to}?cc=${encodeURIComponent(cc.join(","))}&subject=${encodeURIComponent(sub)}`;
}

async function toggleMail(s, mailEl) {
  if (mailEl.classList.contains("open")) { mailEl.classList.remove("open"); return; }
  mailEl.classList.add("open");
  const bodyEl = mailEl.querySelector(".body");
  if (bodyEl.dataset.loaded) return;

  bodyEl.textContent = "Loading…";
  try {
    if (!mailCache[s.id]) {
      const formula = s.quote
        ? `FIND('${s.quote}',ARRAYJOIN({Related Event})&' '&{Subject})`
        : `FIND('${s.title.replace(/'/g, "\\'")}',ARRAYJOIN({Related Event})&' '&{Subject})`;
      mailCache[s.id] = await api(MAIL_TBL, {
        filterByFormula: formula,
        "fields[]": MAIL_FULL_FIELDS,
        "sort[0][field]": "Received Date",
        "sort[0][direction]": "desc",
        pageSize: 100
      });
    }
    const rec = mailCache[s.id].find(r => r.id === mailEl.dataset.mail);
    if (rec) {
      const f = rec.fields;
      let hdr = "To: " + (f["To"] || "—");
      if (f["CC"]) {
        const ccAddrs = extractEmails(f["CC"]);
        hdr += "  ·  CC: " + (ccAddrs.length ? ccAddrs.join(", ") : String(f["CC"]).slice(0, 120));
      }
      mailEl.querySelector(".to").textContent = hdr;
      bodyEl.textContent = cleanBody(f["Body"]) || "(empty body)";

      const bar = document.createElement("div");
      bar.style.cssText = "padding-top:10px;display:flex;gap:8px;flex-wrap:wrap";
      const reply = replyAllHref(f, f["Subject"] || s.title);
      if (reply) {
        const rb = document.createElement("a");
        rb.href = reply;
        rb.textContent = "↩ Reply All";
        rb.style.cssText = "border:1px solid var(--line);border-radius:6px;padding:8px 14px;font-size:12.5px;font-weight:600";
        bar.appendChild(rb);
      }
      (f["Attachments"] || []).forEach(a => {
        const link = document.createElement("a");
        link.href = a.url; link.target = "_blank"; link.rel = "noopener";
        link.textContent = "📎 " + (a.filename || "attachment") + (a.size ? " (" + Math.round(a.size / 1024) + " KB)" : "");
        link.style.cssText = "border:1px solid var(--line);border-radius:6px;padding:8px 14px;font-size:12px";
        bar.appendChild(link);
      });
      if (bar.children.length) bodyEl.appendChild(bar);
    } else {
      bodyEl.textContent = "(couldn't find this email)";
    }
    bodyEl.dataset.loaded = "1";
  } catch (e) {
    bodyEl.textContent = "Failed to load: " + e.message;
  }
}

// ════════════════════════════════════════════════
// PIN GATE + BOOT
// ════════════════════════════════════════════════
function showGate(errMsg) {
  document.getElementById("pinGate").style.display = "flex";
  document.getElementById("app").style.display = "none";
  document.getElementById("pinErr").textContent = errMsg || "";
  setTimeout(() => document.getElementById("pinInput").focus(), 50);
}
function hideGate() {
  document.getElementById("pinGate").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

async function tryPin() {
  const v = document.getElementById("pinInput").value.trim();
  if (!v) return;
  const btn = document.getElementById("pinBtn");
  btn.textContent = "Checking…"; btn.disabled = true;
  try {
    const res = await fetch(`${WORKER}/v0/${BASE}/${EVENTS_TBL}?maxRecords=1&fields%5B%5D=Name&key=${encodeURIComponent(v)}`);
    if (res.status === 401) {
      localStorage.removeItem("dash_pin");
      document.getElementById("pinErr").textContent = "Wrong PIN — try again.";
      document.getElementById("pinInput").value = "";
    } else if (!res.ok) {
      document.getElementById("pinErr").textContent = "Connection problem (" + res.status + ").";
    } else {
      localStorage.setItem("dash_pin", v);
      hideGate();
      loadAll();
    }
  } catch (e) {
    document.getElementById("pinErr").textContent = "Network error — check connection.";
  } finally {
    btn.textContent = "Unlock"; btn.disabled = false;
  }
}

document.getElementById("pinBtn").addEventListener("click", tryPin);
document.getElementById("pinInput").addEventListener("keydown", e => { if (e.key === "Enter") tryPin(); });
document.getElementById("refreshBtn").addEventListener("click", loadAll);
document.getElementById("backBtn").addEventListener("click", () =>
  document.getElementById("main").classList.remove("show-detail"));
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && lastLoad && Date.now() - lastLoad > 10 * 60 * 1000) loadAll();
});

(function boot() {
  if (!pin()) { showGate(); return; }
  hideGate();
  // instant open from cache, then refresh live
  try {
    const c = JSON.parse(localStorage.getItem("dash_cache") || "null");
    if (c && c.events) applyData(c.events, c.positions || [], c.mails || [], true);
  } catch (e) {}
  loadAll();
})();
</script>
